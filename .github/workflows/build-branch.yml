name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build chip32
        run: scripts/build_chip32.sh

      - name: Check package consistency
        run: scripts/check_packages.sh

      - name: Compile
        run: docker run --rm -v ${{ github.workspace }}:/build -w /build raetro/quartus:21.1 quartus_sh -t generate.tcl

      - name: Reverse bitstream
        run: scripts/deploy_bitstream.sh

      - name: Package build zip
        run: |
          set -- pkg/Cores/*/core.json
          VERSION=$(jq -r '.core.metadata.version' "$1")
          SAFE_BRANCH=$(printf '%s' "$GITHUB_REF_NAME" | sed 's#[^A-Za-z0-9._-]#-#g')
          PACKAGE_ZIP="openfpga-SMS_${SAFE_BRANCH}_${VERSION}.zip"
          cd pkg
          zip -r "../${PACKAGE_ZIP}" . -x '*/.gitkeep'
          echo "PACKAGE_BRANCH=${SAFE_BRANCH}" >> "$GITHUB_ENV"
          echo "PACKAGE_ZIP=${PACKAGE_ZIP}" >> "$GITHUB_ENV"

      - name: Upload package zip
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ env.PACKAGE_BRANCH }}
          path: ${{ env.PACKAGE_ZIP }}

      - name: Extract timing closure failures
        if: always()
        run: scripts/extract_timing_failures.sh src/fpga/build/output_files/ap_core.sta.summary timing.txt

      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: timing
          path: timing.txt

      - name: Check custom STA reports
        if: always()
        run: |
          echo "=== Custom STA reports ==="
          ls -la build_output/reports/ 2>/dev/null || echo "No custom STA reports directory found"
          echo "=== Output files ==="
          ls -la src/fpga/build/output_files/*.rpt src/fpga/build/output_files/*.summary 2>/dev/null || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            src/fpga/build/output_files/ap_core.fit.summary
            src/fpga/build/output_files/ap_core.fit.rpt
            src/fpga/build/output_files/ap_core.sta.summary
            src/fpga/build/output_files/ap_core.sta.rpt
            src/fpga/build/output_files/ap_core.flow.rpt
            build_output/reports/
